services:
  remnanode:
    env_file: .env
    container_name: remnanode
    hostname: remnanode
    image: remnawave/node:latest
    network_mode: host
    restart: always
    cap_add:
      - NET_ADMIN
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    environment:
      - NODE_PORT=2222
      - SECRET_KEY=${SECRET_KEY}
    volumes:
      - '/var/log/remnanode:/var/log/remnanode'
